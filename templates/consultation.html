<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>無料相談希望 | キャリア診断MVP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page-shell result-shell">
      <section class="result-hero">
        <p class="eyebrow">Free Consultation</p>
        <h1>次の動き方を無料で相談する</h1>
        <p class="result-headline">
          診断結果: {{ submission.result.market_value_rank }}ランク / {{ submission.result.type_name }}
        </p>
        <p class="result-summary">
          今の悩みを放置しないために、最初に見るべき職種、応募前に直すべきポイント、30日で作る実績を整理します。
        </p>
      </section>

      {% if errors %}
        <div class="error-box">
          <strong>入力内容を確認してください。</strong>
          <ul>
            {% for error in errors %}
              <li>{{ error }}</li>
            {% endfor %}
          </ul>
        </div>
      {% endif %}

      <form method="post" action="{{ url_for('submit_consultation') }}" class="diagnosis-form">
        <input type="hidden" name="lead_id" value="{{ values.lead_id }}">
        <input type="hidden" name="step" value="{{ values.step }}">

        <section class="question-card">
          <label class="question-label" for="name">お名前</label>
          <input id="name" name="name" type="text" value="{{ values.name }}" placeholder="山田 太郎" required>
        </section>

        <section class="question-card">
          <label class="question-label" for="email">返信先メールアドレス</label>
          <input id="email" name="email" type="email" value="{{ values.email }}" placeholder="you@example.com" required>
        </section>

        <section class="question-card">
          <label class="question-label">希望連絡方法</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="contact_method" value="email" {% if values.contact_method == "email" %}checked{% endif %} required>
              <span>メールで相談したい</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="contact_method" value="phone" {% if values.contact_method == "phone" %}checked{% endif %} required>
              <span>電話・オンライン面談を希望する</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="contact_method" value="other" {% if values.contact_method == "other" %}checked{% endif %} required>
              <span>まずは相談方法から決めたい</span>
            </label>
          </div>
        </section>

        <section class="question-card">
          <label class="question-label" for="message">相談したい内容</label>
          <textarea id="message" name="message" rows="5" placeholder="例: 今の職種から年収を上げる転職ルートを知りたい" required>{{ values.message }}</textarea>
        </section>

        <button type="submit" class="primary-button full-width">無料相談を希望する</button>
      </form>
    </main>
  </body>
</html>
