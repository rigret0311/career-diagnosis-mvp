<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>相談希望を受け付けました | キャリア診断MVP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page-shell result-shell">
      <section class="next-step-card">
        <p class="eyebrow">Conversion Saved</p>
        <h1>相談希望を受け付けました</h1>
        <p>
          {{ event.name }}さんの相談希望を保存しました。管理用データは `data/events.json` に記録されています。
        </p>
        <dl class="summary-list">
          <div>
            <dt>診断結果</dt>
            <dd>{{ submission.result.market_value_rank }}ランク / {{ submission.result.type_name }}</dd>
          </div>
          <div>
            <dt>返信先</dt>
            <dd>{{ event.email }}</dd>
          </div>
          <div>
            <dt>希望連絡方法</dt>
            <dd>{{ event.contact_method }}</dd>
          </div>
        </dl>
        <a class="primary-button" href="{{ url_for('index') }}">トップへ戻る</a>
      </section>
    </main>
  </body>
</html>
